name: test-build

on:
workflow_dispatch:
pull_request:
push:
branches-ignore:
- main

jobs:
build:
runs-on: macos-latest

steps:
  - name: checkout
    uses: actions/checkout@v4

  - name: setup xcode
    uses: maxim-lobanov/setup-xcode@v1
    with:
      xcode-version: latest-stable

  - name: install deps
    run: |
      gem install xcpretty
      brew install ldid

  - name: build ipa
    run: |
      chmod +x scripts/build_ipa.sh
      ./scripts/build_ipa.sh

  - name: upload ipa (test only)
    uses: actions/upload-artifact@v4
    with:
      name: test-ipa
      path: |
        build/lara.ipa
        build/xcodebuild.log
